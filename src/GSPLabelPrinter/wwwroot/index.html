<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Печать именных наклеек</title><link rel="stylesheet" href="/css/app.css"></head><body><header><h1>Печать именных наклеек</h1><div class="status"><span id="csvStatus">CSV: проверка...</span><span id="printerStatus">Принтер: не выбран</span><a class="button" href="/settings.html">Настройки</a></div></header><main><section class="panel"><input id="search" class="search" placeholder="Введите ФИО или должность" autocomplete="off"><div id="results"></div><div id="notFound" class="hidden empty">Сотрудник не найден<br><button id="addOpen">Добавить сотрудника</button></div></section><section id="previewPanel" class="panel hidden"><h2>Предварительный вид</h2><div class="label-preview"><div id="labelName"></div><div id="labelPosition"></div></div><label>Количество экземпляров <input id="copies" type="number" min="1" max="10" value="1"></label><button id="printBtn">Напечатать</button><button id="clearBtn" class="secondary">Очистить</button><p id="printHint" class="hint"></p></section></main><div id="modal" class="modal hidden" role="dialog" aria-modal="true"><form id="addForm" class="modal-card"><h2>Добавить сотрудника</h2><label>ФИО<input id="fullName" required maxlength="200"></label><label>Должность<input id="position" required maxlength="200"></label><p id="formError" class="error"></p><div><button id="saveBtn" type="submit">Сохранить</button><button id="savePrintBtn" type="button">Сохранить и напечатать</button><button id="cancelBtn" type="button" class="secondary">Отмена</button></div></form></div><div id="toast" class="toast hidden"></div><script src="/js/app.js"></script></body></html>
