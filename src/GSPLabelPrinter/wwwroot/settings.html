<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Настройки</title><link rel="stylesheet" href="/css/app.css"></head><body><header><h1>Настройки печати</h1><div class="status"><a class="button" href="/">На главную</a></div></header><main><form id="settingsForm" class="panel settings"><label>Принтер<select id="printer"></select></label><p id="printerInfo" class="hint"></p><label>Ориентация<select id="orientation"><option value="Portrait">Вертикальная</option><option value="Landscape">Горизонтальная</option></select></label><label>Копий по умолчанию<input id="copiesDefault" type="number" min="1" max="10"></label><label>Размер ФИО<input id="nameFont" type="number" min="8" max="30" step="0.5"></label><label>Размер должности<input id="posFont" type="number" min="6" max="20" step="0.5"></label><label>Поля, мм<input id="margin" type="number" min="0" max="10" step="0.5"></label><label class="check"><input id="dialog" type="checkbox"> Показывать системный диалог печати</label><button type="submit">Сохранить</button><button id="testPrint" type="button">Тестовая печать</button><p id="msg"></p></form></main><script src="/js/settings.js"></script></body></html>
